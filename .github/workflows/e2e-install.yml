name: E2E Install

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

concurrency:
  group: e2e-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  e2e-install:
    name: ${{ matrix.name }}
    runs-on: ubuntu-latest
    timeout-minutes: 30

    strategy:
      fail-fast: false
      matrix:
        include:
          - name: debian-systemd
            image: jrei/systemd-debian:bookworm
          - name: ubuntu-systemd
            image: jrei/systemd-ubuntu:24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run E2E install test
        run: |
          set -euo pipefail
          docker pull "${{ matrix.image }}"
          cid="$(docker run -d --privileged \
            --cgroupns=host \
            -v /sys/fs/cgroup:/sys/fs/cgroup:rw \
            -v "${{ github.workspace }}:/src:rw" \
            "${{ matrix.image }}")"
          cleanup() { docker rm -f "${cid}" >/dev/null 2>&1 || true; }
          trap cleanup EXIT

          docker exec "${cid}" bash -c '
            set -euo pipefail
            export DEBIAN_FRONTEND=noninteractive
            export ROUTEDNS_CI=1
            export ROUTEDNS_ROOT=/src
            cd /
            chmod +x /src/install.sh /src/uninstall.sh /src/scripts/*.sh
            bash /src/scripts/test-e2e-install.sh
          '

  e2e-summary:
    name: E2E summary
    runs-on: ubuntu-latest
    needs: e2e-install
    if: always()
    steps:
      - name: Report results
        run: |
          if [[ "${{ needs.e2e-install.result }}" == "success" ]]; then
            echo "All E2E install tests passed."
            exit 0
          fi
          echo "E2E install tests failed."
          exit 1
