name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

permissions:
  contents: read

jobs:
  shellcheck:
    name: ShellCheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install ShellCheck
        run: sudo apt-get update -qq && sudo apt-get install -y -qq shellcheck

      - name: Run ShellCheck
        run: make lint

  validate-configs:
    name: Validate Configurations
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: sudo apt-get update -qq && sudo apt-get install -y -qq haproxy shellcheck

      - name: Validate HAProxy configuration syntax
        run: make test-config

      - name: Check Keepalived config syntax
        run: |
          sudo apt-get install -y -qq keepalived
          sudo install -o root -g root -m 755 scripts/healthcheck.sh /etc/keepalived/healthcheck.sh
          sudo install -o root -g root -m 755 scripts/keepalived-notify.sh /etc/keepalived/keepalived-notify.sh
          iface="$(ip route get 1.1.1.1 | awk '{for (i=1;i<=NF;i++) if ($i=="dev") {print $(i+1); exit}}' | sed 's/@.*//')"
          sed \
            -e "s/CHANGE_ME_INTERFACE/${iface}/g" \
            -e 's/CHANGE_ME_VRRP_SECRET/testsec1/g' \
            -e 's/CHANGE_ME_PRIORITY/100/g' \
            -e 's/CHANGE_ME_SCRIPT_WEIGHT/weight -20/g' \
            -e '/CHANGE_ME_UNICAST/d' \
            -e 's|CHANGE_ME_VIP/CHANGE_ME_VIP_PREFIX|127.0.0.1/32|g' \
            configs/keepalived-master.conf > /tmp/keepalived-test.conf
          sudo keepalived -t -f /tmp/keepalived-test.conf

      - name: Verify repository structure
        run: |
          required_files=(
            README.md
            LICENSE
            CHANGELOG.md
            Makefile
            .env.example
            install.sh
            uninstall.sh
            configs/haproxy.cfg
            configs/keepalived-master.conf
            configs/keepalived-backup.conf
            configs/haproxy.service
            configs/keepalived.service
            scripts/install-haproxy.sh
            scripts/install-keepalived.sh
            scripts/install-packages.sh
            scripts/healthcheck.sh
            scripts/reload.sh
            scripts/validate.sh
            scripts/setup.sh
            scripts/render-config.sh
            scripts/apply-config.sh
            scripts/preflight.sh
            scripts/test-platform.sh
            scripts/test-e2e-install.sh
            scripts/logrotate-postrotate.sh
            docs/architecture.md
            docs/setup.md
            docs/installation.md
            docs/keepalived.md
            docs/haproxy.md
            docs/monitoring.md
            docs/tuning.md
            docs/troubleshooting.md
            .github/workflows/platform-test.yml
            .github/workflows/e2e-install.yml
            .github/workflows/latest-packages.yml
            .github/workflows/release.yml
          )
          for f in "${required_files[@]}"; do
            test -f "$f" || { echo "Missing: $f"; exit 1; }
          done
          echo "All required files present."

      - name: Verify Makefile targets
        run: |
          make help
          make ci
          for script in install.sh uninstall.sh scripts/*.sh; do
            test -x "$script" || { echo "Not executable: $script"; exit 1; }
          done

  markdown:
    name: Markdown Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check documentation exists and is non-empty
        run: |
          for doc in README.md CHANGELOG.md docs/*.md; do
            test -s "$doc" || { echo "Empty or missing: $doc"; exit 1; }
          done
