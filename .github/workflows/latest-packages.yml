name: Latest Packages

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: latest-packages-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    shell: bash

jobs:
  latest-packages:
    name: ${{ matrix.platform }}
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 45

    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: debian-13-latest-amd64
            image: debian:trixie
            runner: ubuntu-latest
          - platform: ubuntu-24.04-latest-amd64
            image: ubuntu:24.04
            runner: ubuntu-latest

    container:
      image: ${{ matrix.image }}

    env:
      INSTALL_LATEST_PACKAGES: yes
      HAPROXY_VERSION: "3.4.1"
      KEEPALIVED_VERSION: "2.4.1"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install prerequisites
        run: |
          set -euo pipefail
          export DEBIAN_FRONTEND=noninteractive
          apt-get update -qq
          apt-get install -y -qq bash ca-certificates sudo

      - name: Run platform tests (latest packages)
        run: ./scripts/test-platform.sh

      - name: Verify pinned versions
        run: |
          set -euo pipefail
          haproxy_ver="$(haproxy -v 2>&1 | sed -n '1s/.*\([0-9]\+\.[0-9]\+\.[0-9]\+\).*/\1/p')"
          keepalived_ver="$(keepalived -v 2>&1 | sed -n '1s/.*v\?\([0-9]\+\.[0-9]\+\.[0-9]\+\).*/\1/p')"
          echo "HAProxy: ${haproxy_ver}"
          echo "Keepalived: ${keepalived_ver}"
          test -n "${haproxy_ver}"
          test -n "${keepalived_ver}"
          printf '%s\n%s\n' "3.4.1" "${haproxy_ver}" | sort -C -V
          printf '%s\n%s\n' "2.4.1" "${keepalived_ver}" | sort -C -V

  latest-packages-summary:
    name: Latest packages summary
    runs-on: ubuntu-latest
    needs: latest-packages
    if: always()
    steps:
      - name: Report results
        run: |
          if [[ "${{ needs.latest-packages.result }}" == "success" ]]; then
            echo "Latest package tests passed."
            exit 0
          fi
          echo "Latest package tests failed."
          exit 1
