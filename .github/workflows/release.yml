name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  release:
    name: Create release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify tag matches CHANGELOG
        run: |
          tag="${GITHUB_REF_NAME#v}"
          grep -q "\\[${tag}\\]" CHANGELOG.md || {
            echo "CHANGELOG.md has no section for version ${tag}"
            exit 1
          }

      - name: Run CI checks
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq haproxy shellcheck
          make ci

      - name: Build release archive
        run: |
          archive="routedns-ingress-${GITHUB_REF_NAME}.tar.gz"
          tar czf "${archive}" \
            --exclude='.git' \
            --exclude='*.tar.gz' \
            .
          echo "ARCHIVE=${archive}" >> "${GITHUB_ENV}"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ env.ARCHIVE }}
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
