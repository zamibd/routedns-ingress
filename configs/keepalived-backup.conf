# routedns-ingress — Keepalived BACKUP configuration
# Installed to /etc/keepalived/keepalived.conf on the secondary node.
#
# Rendered from .env via render-config.sh (must match MASTER VRRP settings).
# Run: sudo make preflight

global_defs {
    router_id ROUTEDNS_INGRESS_BACKUP
    script_user root
    enable_script_security
    vrrp_skip_check_adv_addr
}

vrrp_script chk_haproxy {
    script "/etc/keepalived/healthcheck.sh"
    interval 2
    CHANGE_ME_SCRIPT_WEIGHT
    fall 3
    rise 2
    timeout 5
}

vrrp_instance VI_DOT {
    state BACKUP
    interface CHANGE_ME_INTERFACE
    virtual_router_id 51
    priority CHANGE_ME_PRIORITY
    advert_int 1
    CHANGE_ME_UNICAST

    authentication {
        auth_type PASS
        auth_pass CHANGE_ME_VRRP_SECRET
    }

    virtual_ipaddress {
        CHANGE_ME_VIP/CHANGE_ME_VIP_PREFIX dev CHANGE_ME_INTERFACE
        # Optional IPv6 VIP: address/prefix dev interface
    }

    track_script {
        chk_haproxy
    }

    notify_master "/etc/keepalived/keepalived-notify.sh master"
    notify_backup "/etc/keepalived/keepalived-notify.sh backup"
    notify_fault  "/etc/keepalived/keepalived-notify.sh fault"
}
