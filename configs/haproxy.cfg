# routedns-ingress — HAProxy Layer-4 TCP ingress for DNS-over-TLS
# Edit backend server lines below, then: systemctl reload haproxy

global
    log /dev/log local0
    chroot /var/lib/haproxy
    stats socket /run/haproxy/admin.sock mode 660 level admin expose-fd listeners
    stats timeout 30s
    user haproxy
    group haproxy
    daemon

    # Production defaults for high-connection TCP workloads
    maxconn 50000
    tune.bufsize 32768
    tune.maxrewrite 1024

    # Graceful reload — zero downtime
    master-worker

defaults
    log     global
    mode    tcp
    option  tcplog
    option  dontlognull
    option  redispatch
    retries 3
    timeout connect 5s
    timeout client  3600s
    timeout server  3600s
    timeout check   3s
    maxconn 10000

# ---------------------------------------------------------------------------
# Stats socket (local admin only — bind to loopback)
# Access: echo "show stat" | socat stdio /run/haproxy/admin.sock
# ---------------------------------------------------------------------------
listen stats
    bind 127.0.0.1:8404
    mode http
    stats enable
    stats uri /stats
    stats refresh 10s
    stats admin if LOCALHOST
    stats show-legends

# ---------------------------------------------------------------------------
# DNS-over-TLS ingress — TCP passthrough (no TLS termination)
# Clients connect with plain TLS (no PROXY). Ingress sends PROXY v2 to backends.
# ---------------------------------------------------------------------------
frontend dot_ingress_v4
    bind *:853
    maxconn 25000
    default_backend dot_backends

frontend dot_ingress_v6
    bind [::]:853 v6only
    maxconn 25000
    default_backend dot_backends

# ---------------------------------------------------------------------------
# Backend pool — manually add/remove server lines (required before production)
#
# Balance algorithms (uncomment ONE):
#   balance leastconn     — default, recommended for long-lived DoT sessions
#   balance roundrobin    — equal distribution
#   balance static-rr     — weighted round robin (use weight N on server lines)
#
# PROXY protocol: send-proxy-v2 tells backends the original client IP.
# Remove send-proxy-v2 if backends do not support PROXY v2.
# ---------------------------------------------------------------------------
backend dot_backends
    balance leastconn
    option tcp-check

    # TCP health check — connect to backend port 853
    # When USE_PROXY_PROTOCOL=yes, render-config adds: tcp-check send proxy v2
    tcp-check connect port 853

    # Backend servers — generated by: sudo make setup
    # (or add manually and run: sudo make reload)
    server _install_placeholder 127.0.0.1:1 disabled
