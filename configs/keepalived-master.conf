# routedns-ingress — Keepalived MASTER configuration
# Installed to /etc/keepalived/keepalived.conf on the primary node.
#
# Replace all CHANGE_ME_* values before production.
# Run: sudo make preflight

global_defs {
    router_id ROUTEDNS_INGRESS_MASTER
    script_user root
    enable_script_security
    vrrp_skip_check_adv_addr
    vrrp_garp_interval 1
    vrrp_gna_interval 1
}

vrrp_script chk_haproxy {
    script "/etc/keepalived/scripts/healthcheck.sh"
    interval 2
    weight -20
    fall 3
    rise 2
    timeout 5
}

vrrp_instance VI_DOT {
    state MASTER
    interface CHANGE_ME_INTERFACE
    virtual_router_id 51
    priority 100
    advert_int 1

    authentication {
        auth_type PASS
        auth_pass CHANGE_ME_VRRP_SECRET
    }

    virtual_ipaddress {
        CHANGE_ME_VIP/CHANGE_ME_VIP_PREFIX dev CHANGE_ME_INTERFACE
        # CHANGE_ME_VIP6/CHANGE_ME_VIP6_PREFIX dev CHANGE_ME_INTERFACE
    }

    track_script {
        chk_haproxy
    }

    notify_master "/etc/keepalived/scripts/keepalived-notify.sh master"
    notify_backup "/etc/keepalived/scripts/keepalived-notify.sh backup"
    notify_fault  "/etc/keepalived/scripts/keepalived-notify.sh fault"
}
