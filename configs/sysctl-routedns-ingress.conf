# routedns-ingress — kernel tuning for high-connection TCP ingress
# Installed to /etc/sysctl.d/99-routedns-ingress.conf

# Connection backlog
net.core.somaxconn = 65535
net.core.netdev_max_backlog = 65535

# Ephemeral port range for outbound connections to backends
net.ipv4.ip_local_port_range = 1024 65535

# SYN queue and connection lifecycle
net.ipv4.tcp_max_syn_backlog = 65535
net.ipv4.tcp_fin_timeout = 15
net.ipv4.tcp_tw_reuse = 1

# File descriptors
fs.file-max = 2097152

# Disable reverse path filtering on interfaces used for VIP (adjust per deployment)
# net.ipv4.conf.all.rp_filter = 0
# net.ipv4.conf.default.rp_filter = 0
